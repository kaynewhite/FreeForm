<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeForm</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(ellipse at top, #1a1f3a 0%, #0a0d1f 60%, #05060f 100%);
      color: #e6e8f0;
    }
    main {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 640px;
      width: 100%;
      padding: 3rem 2.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8ab4ff;
      background: rgba(138, 180, 255, 0.1);
      border: 1px solid rgba(138, 180, 255, 0.25);
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 2.25rem;
      margin: 0 0 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 1rem;
      line-height: 1.6;
      color: #b8bdd1;
    }
    code {
      background: rgba(255, 255, 255, 0.06);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #6b7290;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <span class="badge">Ready</span>
      <h1>FreeForm</h1>
      <p>Your project is up and running on Replit. This is a blank canvas waiting for your idea.</p>
      <p>Tell me what you'd like to build, and I'll start putting it together.</p>
      <div class="footer">Server: Python http.server · Port 5000</div>
    </div>
  </main>
</body>
</html>
